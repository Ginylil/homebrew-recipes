# Update Formula/fon_versions.yaml (version table). fon.rb reads latest from the table.
# Trigger: Actions → Update fon formula → Run workflow. Optionally pass sha256 if the computed one fails (e.g. from brew install error).
# Add versioned formulae (e.g. fon@0.0.17.rb) later only if needed (e.g. breaking change).
name: Update fon formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: "fon version (e.g. 0.0.17). Must be deployed at fon.ginylil.com/releases/{version}/version."
        required: true
        type: string
      sha256:
        description: "Optional. SHA-256 of releases/{version}/version. If omitted, computed from download. Set this if brew reports a different checksum."
        required: false
        type: string

permissions:
  contents: write

jobs:
  update:
    name: Update version table
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Test stable repo tooling
        run: |
          make test

      - name: Update formula via stable repo tooling
        run: |
          make update-formula VERSION="${{ github.event.inputs.version }}" SHA256="${{ github.event.inputs.sha256 }}"

      - name: Commit and push if changed
        run: |
          if git diff --quiet Formula/; then
            echo "No changes (table and formulae already up to date)"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          git commit -m "chore(fon): update version table to ${{ github.event.inputs.version }}"
          git push
